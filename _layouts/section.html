---
layout: default
---
<section class="section-hero{% if page.hero_image %} section-hero--image{% endif %}"{% if page.hero_image %} style="background-image: url('{{ page.hero_image }}'); background-size: cover; background-position: center; background-repeat: no-repeat;"{% endif %}>
  <div class="section-hero-overlay"></div>
  <div class="container">
    <h1 class="section-hero-title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="section-hero-description">{{ page.description }}</p>
    {% endif %}
  </div>
</section>
<div class="main-layout page-layout">
  <main class="main-content">
    <div class="content-block markdown-content">
      {{ content }}
    </div>
  </main>
</div>
